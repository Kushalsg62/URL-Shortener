<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="body-container">

<nav class="navbar navbar-expand-md fixed-top nav-background">
    <div class="container" style="max-width: 1200px;">

        <!-- Brand -->
        <a class="navbar-brand-saas" th:href="@{/}">
            <span class="brand-icon">S</span>
            <span class="brand-name">Shorten<span class="brand-dot">.io</span></span>
        </a>

        <!-- Mobile toggler -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left nav links -->
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-button" th:href="@{/my-urls}">My URLs</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-button" th:href="@{/admin/dashboard}">Admin</a>
                </li>
            </ul>

            <!-- Right nav -->
            <ul class="navbar-nav align-items-center gap-2">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-button" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-button nav-button-filled" th:href="@{/register}">Register</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <div class="nav-user-chip">
                        <span class="nav-user-avatar" sec:authentication="name"
                              th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                        <span class="nav-user-name" sec:authentication="name"></span>
                    </div>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="logout">Logout</button>
                    </form>
                </li>
            </ul>

        </div>
    </div>
</nav>

<div class="container" style="max-width: 1200px;">

    <!-- Success alert -->
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show mt-4"
         role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Error alert -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show mt-4"
         role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div layout:fragment="content">
        <!-- Page Content -->
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script>
    function copyLink(btn) {
        const url = btn.getAttribute('data-url');
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.classList.add('copied');
        btn.title = 'Copied!';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.title = 'Copy link';
        }, 2000);
    }
</script>
</body>
</html>
