<nav th:if="${shortUrls.totalPages > 1}" class="saas-pagination">
    <ul class="pagination justify-content-center align-items-center gap-1 my-3">

        <!-- First -->
        <li class="page-item" th:classappend="${shortUrls.isFirst ? 'disabled' : ''}">
            <a class="page-link saas-page-link"
               th:href="@{${paginationUrl}(page=1)}"
               aria-label="First">First</a>
        </li>

        <!-- Previous -->
        <li class="page-item" th:classappend="${shortUrls.isFirst ? 'disabled' : ''}">
            <a class="page-link saas-page-link"
               th:href="@{${paginationUrl}(page=${shortUrls.pageNumber - 1})}"
               aria-label="Previous">&#8592; Prev</a>
        </li>

        <!-- Current page indicator -->
        <li class="page-item disabled">
            <span class="saas-page-info"
                  th:text="${shortUrls.pageNumber + ' of ' + shortUrls.totalPages}">
                1 of 10
            </span>
        </li>

        <!-- Next -->
        <li class="page-item" th:classappend="${shortUrls.isLast ? 'disabled' : ''}">
            <a class="page-link saas-page-link"
               th:href="@{${paginationUrl}(page=${shortUrls.pageNumber + 1})}"
               aria-label="Next">Next &#8594;</a>
        </li>

        <!-- Last -->
        <li class="page-item" th:classappend="${shortUrls.isLast ? 'disabled' : ''}">
            <a class="page-link saas-page-link"
               th:href="@{${paginationUrl}(page=${shortUrls.totalPages})}"
               aria-label="Last">Last</a>
        </li>

    </ul>

    <!-- Total count below -->
    <p class="saas-pagination-total"
       th:text="${shortUrls.totalElements + ' total links'}">0 total links</p>

</nav>
