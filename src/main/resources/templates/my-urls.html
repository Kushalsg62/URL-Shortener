<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My URLs</title>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h3 class="page-heading">My URLs</h3>
            <p class="page-subheading">Manage and track all your shortened links</p>
        </div>
        <a th:href="@{/}" class="saas-action-btn">Create New</a>
    </div>

    <!-- Empty state -->
    <div th:if="${shortUrls.data.isEmpty()}" class="my-urls-empty">
        <div class="my-urls-empty-title">No links yet</div>
        <div class="my-urls-empty-desc">You haven't created any short URLs yet. Head to the home page to create your first one.</div>
        <a th:href="@{/}" class="saas-action-btn" style="margin-top: 20px; display: inline-block;">Create your first link</a>
    </div>

    <!-- Table -->
    <div th:unless="${shortUrls.data.isEmpty()}" class="my-urls-card">
        <form id="deleteForm" th:action="@{/delete-urls}" method="post">

            <!-- Toolbar -->
            <div class="my-urls-toolbar">
                <div class="toolbar-left">
                    <label class="select-all-wrap">
                        <input type="checkbox" id="selectAll" class="toolbar-checkbox">
                        <span class="toolbar-label">Select all</span>
                    </label>
                </div>
                <button id="deleteSelectedBtn"
                        type="button"
                        class="delete-btn"
                        disabled>
                    Delete Selected
                </button>
            </div>

            <div class="table-responsive">
                <table class="my-urls-table">
                    <thead>
                    <tr>
                        <th style="width:40px;"></th>
                        <th>Short Link</th>
                        <th>Original URL</th>
                        <th>Created</th>
                        <th>Expires</th>
                        <th>Visibility</th>
                        <th>Clicks</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="url : ${shortUrls.data}">
                        <td>
                            <input type="checkbox"
                                   name="ids"
                                   th:value="${url.id}"
                                   class="row-checkbox toolbar-checkbox">
                        </td>
                        <td>
                            <a class="my-short-link"
                               th:href="@{/s/{key}(key=${url.shortKey})}"
                               th:text="${baseUrl + '/s/' + url.shortKey}"
                               target="_blank"></a>
                        </td>
                        <td>
                            <a class="my-original-link"
                               th:href="${url.originalUrl}"
                               th:text="${#strings.abbreviate(url.originalUrl, 55)}"
                               target="_blank"
                               th:title="${url.originalUrl}"></a>
                        </td>
                        <td>
                                <span class="my-date-text"
                                      th:text="${T(com.kushalsg.urlshortener.util.TimeUtil).format(url.createdAt)}"></span>
                        </td>
                        <td>
                                <span class="my-date-text"
                                      th:text="${url.expiresAt != null ? T(com.kushalsg.urlshortener.util.TimeUtil).format(url.expiresAt) : 'Never'}"></span>
                        </td>
                        <td>
                            <span th:if="${url.private}" class="visibility-badge private">Private</span>
                            <span th:unless="${url.private}" class="visibility-badge public">Public</span>
                        </td>
                        <td>
                            <span class="click-count" th:text="${url.clickCount}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </form>
        <div class="mt-3 px-3 pb-3" th:insert="~{pagination}"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const selectAll     = document.getElementById('selectAll');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            const deleteBtn     = document.getElementById('deleteSelectedBtn');
            const deleteForm    = document.getElementById('deleteForm');

            function updateDeleteBtn() {
                const anyChecked = Array.from(rowCheckboxes).some(cb => cb.checked);
                deleteBtn.disabled = !anyChecked;
            }

            selectAll.addEventListener('change', function () {
                rowCheckboxes.forEach(cb => cb.checked = this.checked);
                updateDeleteBtn();
            });

            rowCheckboxes.forEach(cb => {
                cb.addEventListener('change', function () {
                    updateDeleteBtn();
                    selectAll.checked = Array.from(rowCheckboxes).every(cb => cb.checked);
                });
            });

            deleteBtn.addEventListener('click', function () {
                if (confirm('Delete selected URLs? This cannot be undone.')) {
                    deleteForm.submit();
                }
            });
        });
    </script>
</div>
</body>
</html>
